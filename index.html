<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Medini Homes — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #222632;
  --border: #2a2e3a;
  --text: #e4e4e7;
  --text-dim: #8b8d97;
  --accent: #6366f1;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.12);
  --orange: #f59e0b;
  --orange-bg: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.12);
  --gray: #6b7280;
  --gray-bg: rgba(107,114,128,0.12);
  --purple: #a855f7;
  --purple-bg: rgba(168,85,247,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* --- HEADER --- */
.header {
  background: linear-gradient(135deg, #1e1b4b, #312e81);
  padding: 20px 16px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.logo {
  font-size: 20px;
  font-weight: 700;
  color: white;
  letter-spacing: -0.5px;
}
.logo span { color: var(--accent); }
.date-label {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  font-weight: 500;
}
.live-dot {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  margin-right: 6px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* --- STATS ROW --- */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.stat-card {
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
  backdrop-filter: blur(10px);
}
.stat-num {
  font-size: 24px;
  font-weight: 700;
  color: white;
  line-height: 1;
}
.stat-label {
  font-size: 10px;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}

/* --- TABS --- */
.tabs {
  display: flex;
  gap: 0;
  padding: 12px 16px 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 89px;
  z-index: 99;
}
.tab {
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  user-select: none;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab .badge {
  display: inline-block;
  background: var(--accent);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  margin-left: 6px;
  vertical-align: middle;
}

/* --- FILTERS --- */
.filters {
  display: flex;
  gap: 6px;
  padding: 12px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-chip {
  white-space: nowrap;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-dim);
  transition: all 0.2s;
  user-select: none;
}
.filter-chip.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* --- SECTION HEADER --- */
.section-header {
  padding: 14px 16px 6px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-header .count {
  background: var(--accent);
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
}
.section-header.tomorrow {
  color: var(--purple);
}
.section-header.tomorrow .count {
  background: var(--purple);
}

/* --- CARDS --- */
.cards {
  padding: 4px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cards-bottom {
  padding-bottom: 100px;
}
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 14px;
  border: 1px solid var(--border);
  transition: background 0.2s;
}
.card.tomorrow-card {
  border-color: rgba(168,85,247,0.3);
}
.card:active { background: var(--card-hover); }
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.guest-name {
  font-size: 15px;
  font-weight: 600;
  color: white;
}
.res-id {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.status-submitted { background: var(--green-bg); color: var(--green); }
.status-ready { background: var(--blue-bg); color: var(--blue); }
.status-processing { background: var(--orange-bg); color: var(--orange); }
.status-failed { background: var(--red-bg); color: var(--red); }
.status-sent { background: var(--green-bg); color: var(--green); }
.status-pending { background: var(--gray-bg); color: var(--gray); }
.status-draft_created { background: var(--orange-bg); color: var(--orange); }
.status-no_contact { background: var(--red-bg); color: var(--red); }
.status-waiting_dtcm { background: var(--orange-bg); color: var(--orange); }
.status-waiting_passport { background: var(--orange-bg); color: var(--orange); }
.status-portal_manual { background: var(--purple-bg); color: var(--purple); }
.status-whatsapp_manual { background: var(--purple-bg); color: var(--purple); }

.card-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 12px;
}
.detail {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
}
.detail .icon { font-size: 14px; flex-shrink: 0; }
.detail .val { color: var(--text); font-weight: 500; }

.error-msg {
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--red-bg);
  border-radius: 8px;
  font-size: 11px;
  color: var(--red);
  line-height: 1.4;
}
.warning-msg {
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--orange-bg);
  border-radius: 8px;
  font-size: 11px;
  color: var(--orange);
  line-height: 1.4;
}

/* --- EMPTY STATE --- */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.empty .title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }

/* --- LOADING --- */
.loading {
  display: flex;
  justify-content: center;
  padding: 40px;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* --- LAST UPDATE BAR --- */
.update-bar {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--text-dim);
  z-index: 100;
}
.refresh-btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.refresh-btn:active { opacity: 0.8; }

/* --- ACTION BAR --- */
.action-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.action-btn {
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-family: inherit;
  transition: all 0.2s;
}
.action-btn:active { background: var(--card-hover); transform: scale(0.97); }
.action-btn.email-trigger { border-color: rgba(99,102,241,0.4); }
.action-btn.sakani-trigger { border-color: rgba(168,85,247,0.4); }
.action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.action-btn .spinner-small {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.toast {
  position: fixed;
  bottom: 56px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* --- DESKTOP --- */
@media (min-width: 768px) {
  .header { padding: 24px 32px 20px; }
  .stats-row { max-width: 600px; }
  .tabs { padding: 12px 32px 0; }
  .filters { padding: 12px 32px; }
  .section-header { padding: 14px 32px 6px; }
  .cards {
    padding: 4px 32px 8px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 10px;
  }
  .cards-bottom { padding-bottom: 100px; }
  .stat-num { font-size: 28px; }
  .stat-card { padding: 14px 12px; }
}
@media (min-width: 1200px) {
  .cards { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Medini <span>Homes</span></div>
    <div class="date-label"><span class="live-dot"></span><span id="todayDate"></span></div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">Check-ins</div></div>
    <div class="stat-card"><div class="stat-num" id="statEmail">-</div><div class="stat-label">Emails</div></div>
    <div class="stat-card"><div class="stat-num" id="statSakani">-</div><div class="stat-label">Sakani</div></div>
    <div class="stat-card"><div class="stat-num" id="statFailed">-</div><div class="stat-label">Errors</div></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="all">All <span class="badge" id="badgeAll">0</span></div>
  <div class="tab" data-tab="email">Emails <span class="badge" id="badgeEmail">0</span></div>
  <div class="tab" data-tab="sakani">Sakani <span class="badge" id="badgeSakani">0</span></div>
</div>

<div class="filters" id="filterBar">
  <div class="filter-chip active" data-filter="all">All</div>
  <div class="filter-chip" data-filter="submitted,sent">Done</div>
  <div class="filter-chip" data-filter="ready,pending,draft_created">Pending</div>
  <div class="filter-chip" data-filter="processing">Processing</div>
  <div class="filter-chip" data-filter="no_contact,waiting_dtcm,waiting_passport">Missing</div>
  <div class="filter-chip" data-filter="failed">Errors</div>
</div>

<div class="action-bar">
  <button class="action-btn email-trigger" onclick="triggerEmails()" id="btnEmails">📧 Relancer Emails</button>
  <button class="action-btn sakani-trigger" onclick="triggerSakani()" id="btnSakani">🏛️ Relancer Portail</button>
</div>

<div id="mainContent">
  <div class="loading" style="padding:40px;display:flex;justify-content:center"><div class="spinner"></div></div>
</div>

<div id="toast" class="toast"></div>

<div class="update-bar">
  <span id="lastUpdate">Loading...</span>
  <button class="refresh-btn" onclick="loadAll()">Refresh</button>
</div>

<script>
// --- SUPABASE CONFIG ---
const SUPABASE_URL = "https://mtfhbxeaiqhveuernkfn.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10ZmhieGVhaXFodmV1ZXJua2ZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODc0ODEsImV4cCI6MjA4OTA2MzQ4MX0.3DGSNVwbsrvJ_ARLu9nowuCgov1RyWn9LCFOb5T6s6g";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// --- STATE ---
let emailData = [];
let sakaniData = [];
let tomorrowEmailData = [];
let tomorrowSakaniData = [];
let activeTab = "all";
let activeFilter = "all";

// --- RELIABLE Dubai date using Intl API ---
function todayDubai() {
  const formatter = new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Dubai", year: "numeric", month: "2-digit", day: "2-digit" });
  return formatter.format(new Date()); // returns YYYY-MM-DD
}

function tomorrowDubai() {
  const now = new Date();
  const dubaiStr = new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Dubai", year: "numeric", month: "2-digit", day: "2-digit" }).format(now);
  const d = new Date(dubaiStr + "T00:00:00");
  d.setDate(d.getDate() + 1);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${dd}`;
}

function formatDateShort(d) {
  if (!d) return "-";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
}

function formatDateFull(d) {
  if (!d) return "-";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "long", year: "numeric" });
}

function dubaiTimeNow() {
  return new Intl.DateTimeFormat("en-GB", { timeZone: "Asia/Dubai", hour: "2-digit", minute: "2-digit" }).format(new Date());
}

// --- STATUS HELPERS ---
const STATUS_ICONS = {
  submitted: "\u2705", sent: "\u2705", ready: "\u23f3", pending: "\u23f3",
  draft_created: "\ud83d\udcdd", processing: "\u2699\ufe0f", failed: "\u274c",
  no_contact: "\u274c", waiting_dtcm: "\ud83d\udcc4", waiting_passport: "\ud83d\udec2",
  portal_manual: "\ud83d\udcbb", whatsapp_manual: "\ud83d\udcf1"
};
const STATUS_LABELS = {
  submitted: "Submitted", sent: "Sent", ready: "Pending", pending: "Pending",
  draft_created: "Draft", processing: "Processing", failed: "Failed",
  no_contact: "No contact", waiting_dtcm: "Missing DTCM", waiting_passport: "Missing passport",
  portal_manual: "Manual portal", whatsapp_manual: "Manual WhatsApp",
  superseded: "Superseded", webhook_noise: "Noise", cancelled: "Cancelled"
};

function statusClass(s) {
  return "status-" + (s || "pending").replace(/\s+/g, "_");
}

// --- DATA LOADING ---
async function loadAll() {
  const today = todayDubai();
  const tomorrow = tomorrowDubai();
  document.getElementById("todayDate").textContent = formatDateFull(today);

  const [emailRes, sakaniRes, tmrwEmailRes, tmrwSakaniRes] = await Promise.all([
    sb.from("email_log").select("*").eq("checkin_date", today).order("created_at", { ascending: true }),
    sb.from("sakani_queue").select("*").eq("checkin_date", today).order("created_at", { ascending: true }),
    sb.from("email_log").select("*").eq("checkin_date", tomorrow).order("created_at", { ascending: true }),
    sb.from("sakani_queue").select("*").eq("checkin_date", tomorrow).order("created_at", { ascending: true }),
  ]);

  const HIDDEN = ["superseded", "webhook_noise", "error", "cancelled"];
  emailData = (emailRes.data || []).filter(e => !HIDDEN.includes(e.status));
  sakaniData = sakaniRes.data || [];
  tomorrowEmailData = (tmrwEmailRes.data || []).filter(e => !HIDDEN.includes(e.status));
  tomorrowSakaniData = tmrwSakaniRes.data || [];

  updateStats();
  renderAll();
  document.getElementById("lastUpdate").textContent = `Updated at ${dubaiTimeNow()} (Dubai)`;
}

function updateStats() {
  const uniqueRes = new Set([...emailData.map(e => e.reservation_id), ...sakaniData.map(e => e.reservation_id)]);
  document.getElementById("statTotal").textContent = uniqueRes.size;

  const emailDone = emailData.filter(e => e.status === "sent").length;
  document.getElementById("statEmail").textContent = `${emailDone}/${emailData.length}`;

  const sakaniDone = sakaniData.filter(e => e.status === "submitted").length;
  document.getElementById("statSakani").textContent = `${sakaniDone}/${sakaniData.length}`;

  const allEntries = [...emailData, ...sakaniData];
  const failed = allEntries.filter(e => e.status === "failed").length;
  document.getElementById("statFailed").textContent = failed;
  document.getElementById("statFailed").parentElement.style.background =
    failed > 0 ? "rgba(239,68,68,0.2)" : "";

  document.getElementById("badgeAll").textContent = emailData.length + sakaniData.length;
  document.getElementById("badgeEmail").textContent = emailData.length;
  document.getElementById("badgeSakani").textContent = sakaniData.length;
}

// --- RENDERING ---
function renderAll() {
  const container = document.getElementById("mainContent");
  let html = "";

  // --- TODAY ---
  const todayItems = getTodayItems();
  html += `<div class="section-header">\ud83d\udcc5 Today <span class="count">${todayItems.length}</span></div>`;
  if (todayItems.length > 0) {
    html += `<div class="cards">${todayItems.map(item => renderCard(item, false)).join("")}</div>`;
  } else {
    html += `<div class="cards"><div class="empty"><div class="icon">\ud83d\udced</div><div class="title">No check-ins today</div></div></div>`;
  }

  // --- TOMORROW (J-1 preview) ---
  const tmrwIssues = getTomorrowIssues();
  const tmrwAll = getTomorrowItems();
  if (tmrwAll.length > 0) {
    const issueCount = tmrwIssues.length;
    const label = issueCount > 0
      ? `\ud83d\udd2e Tomorrow \u2014 <span style="color:var(--orange)">${issueCount} missing item${issueCount > 1 ? "s" : ""}</span>`
      : `\ud83d\udd2e Tomorrow \u2014 all set`;
    html += `<div class="section-header tomorrow">${label} <span class="count">${tmrwAll.length}</span></div>`;
    const itemsToShow = issueCount > 0 ? tmrwIssues : tmrwAll;
    html += `<div class="cards cards-bottom">${itemsToShow.map(item => renderCard(item, true)).join("")}</div>`;
  }

  if (tmrwAll.length === 0) {
    html += `<div style="height:100px"></div>`;
  }

  container.innerHTML = html;
}

function mergeByReservation(items) {
  // When both email_log and sakani_queue exist for the same reservation,
  // keep only the most relevant card (portal done = no email needed)
  const grouped = {};
  items.forEach(item => {
    const key = item.reservation_id;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(item);
  });
  const merged = [];
  Object.values(grouped).forEach(group => {
    if (group.length === 1) { merged.push(group[0]); return; }
    const sakani = group.find(i => i._type === "sakani");
    const email = group.find(i => i._type === "email");
    if (sakani && email) {
      // Portal submitted → no email needed, show sakani only
      if (sakani.status === "submitted") { merged.push(sakani); return; }
      // Email sent → show email only
      if (email.status === "sent") { merged.push(email); return; }
      // Portal manual / whatsapp manual → done via other channel, show sakani if pending
      if (["portal_manual", "whatsapp_manual"].includes(email.status)) { merged.push(sakani); return; }
      // Otherwise show both (different issues)
      merged.push(...group);
    } else {
      merged.push(...group);
    }
  });
  return merged;
}

function getTodayItems() {
  let items = [];
  if (activeTab === "all" || activeTab === "email") {
    items.push(...emailData.map(e => ({ ...e, _type: "email" })));
  }
  if (activeTab === "all" || activeTab === "sakani") {
    items.push(...sakaniData.map(e => ({ ...e, _type: "sakani" })));
  }
  // Merge duplicates only in "all" tab
  if (activeTab === "all") items = mergeByReservation(items);
  if (activeFilter !== "all") {
    const allowed = activeFilter.split(",");
    items = items.filter(e => allowed.includes(e.status));
  }
  return items;
}

function getTomorrowItems() {
  let items = [];
  if (activeTab === "all" || activeTab === "email") {
    items.push(...tomorrowEmailData.map(e => ({ ...e, _type: "email" })));
  }
  if (activeTab === "all" || activeTab === "sakani") {
    items.push(...tomorrowSakaniData.map(e => ({ ...e, _type: "sakani" })));
  }
  if (activeTab === "all") items = mergeByReservation(items);
  return items;
}

function getTomorrowIssues() {
  const ISSUE_STATUSES = ["no_contact", "waiting_dtcm", "waiting_passport", "failed", "portal_manual", "whatsapp_manual"];
  let items = getTomorrowItems();
  // For sakani: flag pending without passport
  return items.filter(item => {
    if (ISSUE_STATUSES.includes(item.status)) return true;
    if (item._type === "sakani" && item.status === "pending" && !item.passport_file_path) return true;
    return false;
  });
}

function renderCard(item, isTomorrow) {
  const isEmail = item._type === "email";
  const guestName = isEmail ? (item.guest_name || "-") : `${item.guest_first_name || ""} ${item.guest_last_name || ""}`.trim() || "-";
  const icon = STATUS_ICONS[item.status] || "\u23f3";
  const label = STATUS_LABELS[item.status] || item.status;
  const typeLabel = isEmail ? "\ud83d\udce7 Email Building" : "\ud83c\udfdb\ufe0f Sakani";

  let alertHtml = "";
  if (item.status === "failed" && item.error_message) {
    alertHtml = `<div class="error-msg">\u26a0\ufe0f ${escHtml((item.error_message || "").substring(0, 200))}</div>`;
  } else if (item.status === "no_contact") {
    alertHtml = `<div class="warning-msg">\u26a0\ufe0f No contact for this building. Add to building_contacts.</div>`;
  } else if (item.status === "waiting_dtcm") {
    alertHtml = `<div class="warning-msg">\ud83d\udcc4 Missing DTCM permit. Upload before sending.</div>`;
  } else if (item.status === "waiting_passport") {
    alertHtml = `<div class="warning-msg">\ud83d\udec2 Missing passport. Upload to proceed.</div>`;
  } else if (item._type === "sakani" && item.status === "pending" && !item.passport_file_path) {
    alertHtml = `<div class="warning-msg">\ud83d\udec2 Passport not yet uploaded. Sakani cannot submit.</div>`;
  }

  return `
    <div class="card${isTomorrow ? " tomorrow-card" : ""}">
      <div class="card-header">
        <div>
          <div class="guest-name">${escHtml(guestName)}</div>
          <div class="res-id">${typeLabel} \u00b7 #${escHtml(item.reservation_id || "-")}</div>
        </div>
        <div class="status-badge ${statusClass(item.status)}">${icon} ${label}</div>
      </div>
      <div class="card-details">
        <div class="detail"><span class="icon">\ud83c\udfe2</span><span class="val">${escHtml(item.building || "-")}</span></div>
        <div class="detail"><span class="icon">\ud83d\udeaa</span><span class="val">Apt ${escHtml(item.apartment_no || "-")}</span></div>
        <div class="detail"><span class="icon">\ud83d\udcc5</span><span class="val">${formatDateShort(item.checkin_date)} \u2192 ${formatDateShort(item.checkout_date)}</span></div>
        ${!isEmail ? `<div class="detail"><span class="icon">\ud83c\udf0d</span><span class="val">${escHtml(item.nationality || "-")}</span></div>` :
          `<div class="detail"><span class="icon">\ud83d\udce8</span><span class="val">${escHtml((item.building_email || "-").split("@")[0])}</span></div>`}
      </div>
      ${alertHtml}
    </div>`;
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// --- TABS ---
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeTab = tab.dataset.tab;
    renderAll();
  });
});

// --- FILTERS ---
document.querySelectorAll(".filter-chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    activeFilter = chip.dataset.filter;
    renderAll();
  });
});

// --- REAL-TIME SUBSCRIPTIONS ---
function setupRealtime() {
  sb.channel("dashboard-email")
    .on("postgres_changes", { event: "*", schema: "public", table: "email_log" }, () => loadAll())
    .subscribe();
  sb.channel("dashboard-sakani")
    .on("postgres_changes", { event: "*", schema: "public", table: "sakani_queue" }, () => loadAll())
    .subscribe();
}

// --- TOAST ---
function showToast(msg, duration = 3000) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), duration);
}

// --- TRIGGER: EMAILS ---
async function triggerEmails() {
  const btn = document.getElementById("btnEmails");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-small"></span> En cours...';
  try {
    const today = todayDubai();
    // Reset waiting/failed entries to pending so Apps Script picks them up
    const RETRYABLE = ["waiting_dtcm", "waiting_passport", "draft_created", "no_contact"];
    const { data, error } = await sb
      .from("email_log")
      .update({ status: "pending" })
      .eq("checkin_date", today)
      .in("status", RETRYABLE)
      .select("id");
    if (error) throw error;
    const count = data ? data.length : 0;
    showToast(`✅ ${count} email(s) relancé(s)`);
    await loadAll();
  } catch (e) {
    showToast("❌ Erreur: " + e.message);
  }
  btn.disabled = false;
  btn.innerHTML = "📧 Relancer Emails";
}

// --- TRIGGER: SAKANI PORTAIL ---
async function triggerSakani() {
  const btn = document.getElementById("btnSakani");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-small"></span> En cours...';
  try {
    const today = todayDubai();
    const tomorrow = tomorrowDubai();
    // Reset failed/pending sakani entries
    const { data, error } = await sb
      .from("sakani_queue")
      .update({ status: "pending" })
      .in("checkin_date", [today, tomorrow])
      .in("status", ["failed", "pending"])
      .select("id");
    if (error) throw error;
    const count = data ? data.length : 0;
    showToast(`✅ ${count} enregistrement(s) portail relancé(s)`);
    await loadAll();
  } catch (e) {
    showToast("❌ Erreur: " + e.message);
  }
  btn.disabled = false;
  btn.innerHTML = "🏛️ Relancer Portail";
}

// --- AUTO REFRESH (fallback every 60s) ---
setInterval(loadAll, 60000);

// --- INIT ---
loadAll();
setupRealtime();
</script>
