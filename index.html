<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Medini Homes — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #222632;
  --border: #2a2e3a;
  --text: #e4e4e7;
  --text-dim: #8b8d97;
  --accent: #6366f1;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.12);
  --orange: #f59e0b;
  --orange-bg: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.12);
  --gray: #6b7280;
  --gray-bg: rgba(107,114,128,0.12);
  --purple: #a855f7;
  --purple-bg: rgba(168,85,247,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* --- HEADER --- */
.header {
  background: linear-gradient(135deg, #1e1b4b, #312e81);
  padding: 20px 16px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.logo {
  font-size: 20px;
  font-weight: 700;
  color: white;
  letter-spacing: -0.5px;
}
.logo span { color: var(--accent); }
.date-label {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  font-weight: 500;
}
.live-dot {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  margin-right: 6px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* --- STATS ROW --- */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px;
}
.stat-card {
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
  backdrop-filter: blur(10px);
}
.stat-num {
  font-size: 24px;
  font-weight: 700;
  color: white;
  line-height: 1;
}
.stat-label {
  font-size: 10px;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}
.stat-value {
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  margin-top: 2px;
  font-weight: 500;
}

/* --- TABS --- */
.tabs {
  display: flex;
  gap: 0;
  padding: 12px 16px 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 89px;
  z-index: 99;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab {
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  user-select: none;
  white-space: nowrap;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab .badge {
  display: inline-block;
  background: var(--accent);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  margin-left: 6px;
  vertical-align: middle;
}

/* --- FILTERS --- */
.filters {
  display: flex;
  gap: 6px;
  padding: 12px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-chip {
  white-space: nowrap;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-dim);
  transition: all 0.2s;
  user-select: none;
}
.filter-chip.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* --- BUILDING FILTER --- */
.building-filter {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}
.building-filter-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.building-chips {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.building-chip {
  white-space: nowrap;
  padding: 6px 12px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  transition: all 0.2s;
  user-select: none;
}
.building-chip.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* --- SECTION HEADER --- */
.section-header {
  padding: 14px 16px 6px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-header .count {
  background: var(--accent);
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
}
.section-header.tomorrow {
  color: var(--purple);
}
.section-header.tomorrow .count {
  background: var(--purple);
}

/* --- CARDS --- */
.cards {
  padding: 4px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cards-bottom {
  padding-bottom: 100px;
}
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 14px;
  border: 1px solid var(--border);
  transition: background 0.2s;
  position: relative;
}
.card.tomorrow-card {
  border-color: rgba(168,85,247,0.3);
}
.card:active { background: var(--card-hover); }
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.card-title {
  flex: 1;
}
.guest-name {
  font-size: 15px;
  font-weight: 600;
  color: white;
}
.res-id {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}
.card-header-right {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.status-submitted { background: var(--green-bg); color: var(--green); }
.status-ready { background: var(--blue-bg); color: var(--blue); }
.status-processing { background: var(--orange-bg); color: var(--orange); }
.status-failed { background: var(--red-bg); color: var(--red); }
.status-sent { background: var(--green-bg); color: var(--green); }
.status-pending { background: var(--gray-bg); color: var(--gray); }
.status-draft_created { background: var(--orange-bg); color: var(--orange); }
.status-no_contact { background: var(--red-bg); color: var(--red); }
.status-waiting_dtcm { background: var(--orange-bg); color: var(--orange); }
.status-waiting_passport { background: var(--orange-bg); color: var(--orange); }
.status-portal_manual { background: var(--purple-bg); color: var(--purple); }
.status-whatsapp_manual { background: var(--purple-bg); color: var(--purple); }

.card-countdown {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 16px;
  white-space: nowrap;
  background: rgba(245,158,11,0.15);
  color: var(--orange);
}
.card-countdown.overdue {
  background: rgba(239,68,68,0.15);
  color: var(--red);
}
.card-countdown.completed {
  background: rgba(34,197,94,0.15);
  color: var(--green);
}

.card-actions {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 4px;
}
.card-action-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card-hover);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  padding: 0;
  font-family: inherit;
}
.card-action-btn:hover {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.card-action-btn:active { transform: scale(0.92); }
.card-action-btn.portal-btn {
  width: auto;
  padding: 0 8px;
  font-size: 11px;
  gap: 3px;
  background: var(--purple-bg);
  border-color: var(--purple);
  color: var(--purple);
}
.card-action-btn.portal-btn:hover {
  background: var(--purple);
  color: white;
}

/* --- PORTAL POPUP --- */
.portal-overlay {
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.portal-popup {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 440px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 20px;
}
.portal-popup h3 {
  font-size: 16px;
  margin-bottom: 12px;
  color: white;
}
.portal-popup .portal-type-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 12px;
}
.portal-popup .field-group {
  margin-bottom: 8px;
}
.portal-popup .field-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 2px;
}
.portal-popup .field-value {
  font-size: 14px;
  color: var(--text);
  padding: 6px 10px;
  background: var(--bg);
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.2s;
  word-break: break-all;
}
.portal-popup .field-value:hover {
  border-color: var(--accent);
}
.portal-popup .field-value:active {
  background: var(--accent);
  color: white;
}
.portal-popup .action-row {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.portal-popup .popup-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.portal-popup .btn-open {
  background: var(--purple);
  color: white;
}
.portal-popup .btn-copy {
  background: var(--blue);
  color: white;
}
.portal-popup .btn-close {
  background: var(--gray-bg);
  color: var(--text-dim);
}
.portal-popup .btn-done {
  background: var(--green);
  color: white;
}

.card-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 12px;
}
.detail {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
}
.detail .icon { font-size: 14px; flex-shrink: 0; }
.detail .val { color: var(--text); font-weight: 500; }

.error-msg {
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--red-bg);
  border-radius: 8px;
  font-size: 11px;
  color: var(--red);
  line-height: 1.4;
}
.warning-msg {
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--orange-bg);
  border-radius: 8px;
  font-size: 11px;
  color: var(--orange);
  line-height: 1.4;
}

/* --- EMPTY STATE --- */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.empty .title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }

/* --- LOADING --- */
.loading {
  display: flex;
  justify-content: center;
  padding: 40px;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* --- CALENDAR VIEW --- */
.calendar-view {
  padding: 16px;
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-bottom: 20px;
}
.calendar-cell {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  transition: all 0.2s;
  padding: 8px;
  text-align: center;
}
.calendar-cell:hover { background: var(--card-hover); }
.calendar-cell.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.calendar-cell-day {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}
.calendar-cell.active .calendar-cell-day { color: white; }
.calendar-cell-count {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 2px;
}
.calendar-cell.active .calendar-cell-count { color: rgba(255,255,255,0.7); }
.calendar-cell-dots {
  display: flex;
  gap: 2px;
  margin-top: 4px;
  justify-content: center;
}
.calendar-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
}
.calendar-dot.email { background: var(--blue); }
.calendar-dot.sakani { background: var(--purple); }
.calendar-dot.error { background: var(--red); }

/* --- LAST UPDATE BAR --- */
.update-bar {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--text-dim);
  z-index: 100;
}
.refresh-btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.refresh-btn:active { opacity: 0.8; }

/* --- ACTION BAR --- */
.action-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.action-btn {
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-family: inherit;
  transition: all 0.2s;
}
.action-btn:active { background: var(--card-hover); transform: scale(0.97); }
.action-btn.email-trigger { border-color: rgba(99,102,241,0.4); }
.action-btn.sakani-trigger { border-color: rgba(168,85,247,0.4); }
.action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.action-btn .spinner-small {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.toast {
  position: fixed;
  bottom: 56px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* --- DESKTOP --- */
@media (min-width: 768px) {
  .header { padding: 24px 32px 20px; }
  .stats-row { max-width: 100%; }
  .tabs { padding: 12px 32px 0; }
  .filters { padding: 12px 32px; }
  .building-filter { padding: 8px 32px; }
  .section-header { padding: 14px 32px 6px; }
  .cards {
    padding: 4px 32px 8px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 10px;
  }
  .cards-bottom { padding-bottom: 100px; }
  .stat-num { font-size: 28px; }
  .stat-card { padding: 14px 12px; }
}
@media (min-width: 1200px) {
  .cards { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Medini <span>Homes</span></div>
    <div class="date-label"><span class="live-dot"></span><span id="todayDate"></span></div>
  </div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">-</div>
      <div class="stat-label">Total</div>
      <div class="stat-value" id="statRate">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statEmail">-</div>
      <div class="stat-label">Email</div>
      <div class="stat-value">Sent</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statSakani">-</div>
      <div class="stat-label">Portal</div>
      <div class="stat-value">Submitted</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statPending">-</div>
      <div class="stat-label">Pending</div>
      <div class="stat-value" id="statChannels">-</div>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="today">📅 Today <span class="badge" id="badgeToday">0</span></div>
  <div class="tab" data-tab="tomorrow">🔮 Tomorrow <span class="badge" id="badgeTomorrow">0</span></div>
  <div class="tab" data-tab="plus2">+2 days <span class="badge" id="badgePlus2">0</span></div>
  <div class="tab" data-tab="plus3">+3 days <span class="badge" id="badgePlus3">0</span></div>
  <div class="tab" data-tab="calendar">📆 Calendar</div>
</div>

<div class="filters" id="filterBar">
  <div class="filter-chip active" data-filter="all">All</div>
  <div class="filter-chip" data-filter="submitted,sent">Done</div>
  <div class="filter-chip" data-filter="ready,pending,draft_created">Pending</div>
  <div class="filter-chip" data-filter="processing">Processing</div>
  <div class="filter-chip" data-filter="no_contact,waiting_dtcm,waiting_passport">Missing</div>
  <div class="filter-chip" data-filter="failed">Errors</div>
</div>

<div class="building-filter">
  <div class="building-filter-label">Buildings</div>
  <div class="building-chips" id="buildingChips"></div>
</div>

<div class="action-bar">
  <button class="action-btn email-trigger" onclick="triggerEmails()" id="btnEmails">📧 Relancer Emails</button>
  <button class="action-btn sakani-trigger" onclick="triggerSakani()" id="btnSakani">🏛️ Relancer Portail</button>
</div>

<div id="mainContent">
  <div class="loading" style="padding:40px;display:flex;justify-content:center"><div class="spinner"></div></div>
</div>

<div id="toast" class="toast"></div>
<div id="portalOverlay" class="portal-overlay" style="display:none" onclick="closePortalPopup(event)">
  <div class="portal-popup" id="portalPopup" onclick="event.stopPropagation()"></div>
</div>

<div class="update-bar">
  <span id="lastUpdate">Loading...</span>
  <button class="refresh-btn" onclick="loadAll()">Refresh</button>
</div>

<script>
// --- SUPABASE CONFIG ---
const SUPABASE_URL = "https://mtfhbxeaiqhveuernkfn.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10ZmhieGVhaXFodmV1ZXJua2ZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODc0ODEsImV4cCI6MjA4OTA2MzQ4MX0.3DGSNVwbsrvJ_ARLu9nowuCgov1RyWn9LCFOb5T6s6g";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// --- STATE ---
let emailData = [];
let sakaniData = [];
let plus2EmailData = [];
let plus2SakaniData = [];
let plus3EmailData = [];
let plus3SakaniData = [];
let allDaysData = {};
let activeTab = "today";
let activeFilter = "all";
let selectedBuilding = "all";
const HIDDEN = ["superseded", "webhook_noise", "error", "cancelled"];

// --- Dubai timezone functions ---
function todayDubai() {
  const formatter = new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Dubai", year: "numeric", month: "2-digit", day: "2-digit" });
  return formatter.format(new Date());
}

function addDaysDubai(n) {
  const today = todayDubai();
  const d = new Date(today + "T00:00:00");
  d.setDate(d.getDate() + n);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${dd}`;
}

function formatDateShort(d) {
  if (!d) return "-";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
}

function formatDateFull(d) {
  if (!d) return "-";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "long", year: "numeric" });
}

function dubaiTimeNow() {
  return new Intl.DateTimeFormat("en-GB", { timeZone: "Asia/Dubai", hour: "2-digit", minute: "2-digit" }).format(new Date());
}

function getCountdownText(checkinDate, isTomorrow) {
  const today = todayDubai();
  if (checkinDate === today) {
    const now = new Date();
    const dubaiTime = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Dubai" }));
    const ciDate = new Date(checkinDate + "T23:59:59");
    const diff = ciDate - dubaiTime;
    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    if (diff < 0) return "Overdue";
    if (hours <= 0) return `${minutes}m left`;
    return `${hours}h left`;
  }
  return formatDateShort(checkinDate);
}

  draft_created: "📝", processing: "⚙️", failed: "❌",

};
const STATUS_LABELS = {

// --- DATA LOADING ---
async function loadAll() {
  const today = todayDubai();
  const tomorrow = addDaysDubai(1);
  const plus2 = addDaysDubai(2);
  const plus3 = addDaysDubai(3);
  document.getElementById("todayDate").textContent = formatDateFull(today);

  const [emailRes, sakaniRes, tmrwEmailRes, tmrwSakaniRes, plus2EmailRes, plus2SakaniRes, plus3EmailRes, plus3SakaniRes] = await Promise.all([
    sb.from("email_log").select("*").eq("checkin_date", today).order("created_at", { ascending: true }),
    sb.from("sakani_queue").select("*").eq("checkin_date", today).order("created_at", { ascending: true }),
    sb.from("email_log").select("*").eq("checkin_date", tomorrow).order("created_at", { ascending: true }),
    sb.from("sakani_queue").select("*").eq("checkin_date", tomorrow).order("created_at", { ascending: true }),
    sb.from("email_log").select("*").eq("checkin_date", plus2).order("created_at", { ascending: true }),
    sb.from("sakani_queue").select("*").eq("checkin_date", plus2).order("created_at", { ascending: true }),
    sb.from("email_log").select("*").eq("checkin_date", plus3).order("created_at", { ascending: true }),
    sb.from("sakani_queue").select("*").eq("checkin_date", plus3).order("created_at", { ascending: true }),
  ]);

  emailData = (emailRes.data || []).filter(e => !HIDDEN.includes(e.status));
  sakaniData = sakaniRes.data || [];
  plus2EmailData = (plus2EmailRes.data || []).filter(e => !HIDDEN.includes(e.status));
  plus2SakaniData = plus2SakaniRes.data || [];
  plus3EmailData = (plus3EmailRes.data || []).filter(e => !HIDDEN.includes(e.status));
  plus3SakaniData = plus3SakaniRes.data || [];

  allDaysData = {
    today: { email: emailData, sakani: sakaniData },
    tomorrow: { email: (tmrwEmailRes.data || []).filter(e => !HIDDEN.includes(e.status)), sakani: tmrwSakaniRes.data || [] },
    plus2: { email: plus2EmailData, sakani: plus2SakaniData },
    plus3: { email: plus3EmailData, sakani: plus3SakaniData }
  };

  updateBuildingFilter();
  updateStats();
  renderAll();
  document.getElementById("lastUpdate").textContent = `Updated at ${dubaiTimeNow()} (Dubai)`;
}

function updateBuildingFilter() {
  const buildings = new Set();
  [...emailData, ...sakaniData, ...plus2EmailData, ...plus2SakaniData, ...plus3EmailData, ...plus3SakaniData].forEach(item => {
    if (item.building) buildings.add(item.building);
  });
  const sorted = Array.from(buildings).sort();
  const chipsHtml = '<div class="building-chip active" data-building="all">All</div>' +
    sorted.map(b => `<div class="building-chip" data-building="${escHtml(b)}">${escHtml(b)}</div>`).join("");
  document.getElementById("buildingChips").innerHTML = chipsHtml;
  document.querySelectorAll(".building-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      document.querySelectorAll(".building-chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      selectedBuilding = chip.dataset.building;
      renderAll();
    });
  });
}

function updateStats() {
  const allItems = [...emailData, ...sakaniData, ...plus2EmailData, ...plus2SakaniData, ...plus3EmailData, ...plus3SakaniData];
  const uniqueRes = new Set(allItems.map(e => e.reservation_id));
  document.getElementById("statTotal").textContent = uniqueRes.size;

  const emailSent = emailData.filter(e => e.status === "sent").length;
  document.getElementById("statEmail").textContent = emailSent;

  const sakaniSubmitted = sakaniData.filter(e => e.status === "submitted").length;
  document.getElementById("statSakani").textContent = sakaniSubmitted;

  const pending = allItems.filter(e => ["pending", "ready", "draft_created", "processing"].includes(e.status)).length;
  document.getElementById("statPending").textContent = pending;

  const automationCount = [...emailData, ...sakaniData].filter(e => ["sent", "submitted", "processing"].includes(e.status)).length;
  const totalToday = emailData.length + sakaniData.length;
  const rate = totalToday > 0 ? Math.round((automationCount / totalToday) * 100) : 0;
  document.getElementById("statRate").textContent = `${rate}% auto`;

  document.getElementById("badgeToday").textContent = emailData.length + sakaniData.length;
  document.getElementById("badgeTomorrow").textContent = allDaysData.tomorrow.email.length + allDaysData.tomorrow.sakani.length;
  document.getElementById("badgePlus2").textContent = plus2EmailData.length + plus2SakaniData.length;
  document.getElementById("badgePlus3").textContent = plus3EmailData.length + plus3SakaniData.length;
}

// --- RENDERING ---
function renderAll() {
  const container = document.getElementById("mainContent");

  if (activeTab === "calendar") {
    renderCalendar(container);
    return;
  }

  let html = "";
  let dateKey, dayLabel, dayData;

  if (activeTab === "today") {
    dateKey = "today";
    dayLabel = "📅 Today";
    dayData = allDaysData.today;
  } else if (activeTab === "tomorrow") {
    dateKey = "tomorrow";
    dayLabel = "🔮 Tomorrow";
    dayData = allDaysData.tomorrow;
  } else if (activeTab === "plus2") {
    dateKey = "plus2";
    dayLabel = "+2 Days";
    dayData = allDaysData.plus2;
  } else {
    dateKey = "plus3";
    dayLabel = "+3 Days";
    dayData = allDaysData.plus3;
  }

  const items = getFilteredItems(dayData);
  html += `<div class="section-header${dateKey !== "today" ? " tomorrow" : ""}">${dayLabel} <span class="count">${items.length}</span></div>`;

  if (items.length > 0) {
    html += `<div class="cards${dateKey !== "today" ? " cards-bottom" : ""}">${items.map(item => renderCard(item, dateKey !== "today")).join("")}</div>`;
  } else {
    html += `<div class="cards"><div class="empty"><div class="icon">🎉</div><div class="title">No check-ins</div></div></div>`;
  }

  if (dateKey !== "today") {
    html += `<div style="height:100px"></div>`;
  }

  container.innerHTML = html;
  attachCardActions();
}

function renderCalendar(container) {
  const today = todayDubai();
  const dates = [];
  for (let i = 0; i < 30; i++) {
    dates.push(addDaysDubai(i));
  }

  let html = '<div class="calendar-view">';
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;text-align:center;font-size:11px;font-weight:600;color:var(--text-dim);">';
  ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(d => {
    html += `<div>${d}</div>`;
  });
  html += '</div>';

  html += '<div class="calendar-grid">';
  dates.forEach(date => {
    const dateData = allDaysData[Object.keys(allDaysData).find(k => {
      const d = todayDubai();
      if (k === "today") return date === d;
      if (k === "tomorrow") return date === addDaysDubai(1);
      if (k === "plus2") return date === addDaysDubai(2);
      if (k === "plus3") return date === addDaysDubai(3);
      return false;
    })] || { email: [], sakani: [] };

    const allItems = [...dateData.email, ...dateData.sakani];
    const emailCount = dateData.email.length;
    const sakaniCount = dateData.sakani.length;
    const errorCount = allItems.filter(e => e.status === "failed").length;
    const dt = new Date(date + "T00:00:00");
    const day = dt.getDate();

    html += `<div class="calendar-cell${date === today ? " active" : ""}" onclick="switchToDate('${date}')">
      <div class="calendar-cell-day">${day}</div>
      ${allItems.length > 0 ? `<div class="calendar-cell-count">${allItems.length}</div>` : ""}
      <div class="calendar-cell-dots">
        ${emailCount > 0 ? '<span class="calendar-dot email"></span>' : ""}
        ${sakaniCount > 0 ? '<span class="calendar-dot sakani"></span>' : ""}
        ${errorCount > 0 ? '<span class="calendar-dot error"></span>' : ""}
      </div>
    </div>`;
  });
  html += '</div></div>';

  container.innerHTML = html;
}

function switchToDate(dateStr) {
  const today = todayDubai();
  if (dateStr === today) {
    activeTab = "today";
  } else if (dateStr === addDaysDubai(1)) {
    activeTab = "tomorrow";
  } else if (dateStr === addDaysDubai(2)) {
    activeTab = "plus2";
  } else if (dateStr === addDaysDubai(3)) {
    activeTab = "plus3";
  }
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelector(`[data-tab="${activeTab}"]`).classList.add("active");
  renderAll();
}

function getFilteredItems(dayData) {
  let items = [];
  items.push(...dayData.email.map(e => ({ ...e, _type: "email" })));
  items.push(...dayData.sakani.map(e => ({ ...e, _type: "sakani" })));

  items = mergeByReservation(items);

  if (selectedBuilding !== "all") {
    items = items.filter(e => e.building === selectedBuilding);
  }

  if (activeFilter !== "all") {
    const allowed = activeFilter.split(",");
    items = items.filter(e => allowed.includes(e.status));
  }
  return items;
}

function mergeByReservation(items) {
  const grouped = {};
  items.forEach(item => {
    const key = item.reservation_id;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(item);
  });
  const merged = [];
  Object.values(grouped).forEach(group => {
    if (group.length === 1) { merged.push(group[0]); return; }
    const sakani = group.find(i => i._type === "sakani");
    const email = group.find(i => i._type === "email");
    if (sakani && email) {
      if (sakani.status === "submitted") { merged.push(sakani); return; }
      if (email.status === "sent") { merged.push(email); return; }
      if (["portal_manual", "whatsapp_manual"].includes(email.status)) { merged.push(sakani); return; }
      merged.push(...group);
    } else {
      merged.push(...group);
    }
  });
  return merged;
}

function renderCard(item, isTomorrow) {
  const isEmail = item._type === "email";
  const guestName = isEmail ? (item.guest_name || "-") : `${item.guest_first_name || ""} ${item.guest_last_name || ""}`.trim() || "-";
  const icon = STATUS_ICONS[item.status] || "⏳";
  const label = STATUS_LABELS[item.status] || item.status;
  const typeLabel = isEmail ? "📧 Email" : "🏛️ Portal";
  const countdown = getCountdownText(item.checkin_date, isTomorrow);

  let alertHtml = "";
  if (item.status === "failed" && item.error_message) {
    alertHtml = `<div class="error-msg">⚠️ ${escHtml((item.error_message || "").substring(0, 200))}</div>`;
  } else if (item.status === "no_contact") {
    alertHtml = `<div class="warning-msg">⚠️ No contact for this building. Add to building_contacts.</div>`;
  } else if (item.status === "waiting_dtcm") {
    alertHtml = `<div class="warning-msg">📄 Missing DTCM permit. Upload before sending.</div>`;
  } else if (item.status === "waiting_passport") {
    alertHtml = `<div class="warning-msg">🛂 Missing passport. Upload to proceed.</div>`;
  } else if (item._type === "sakani" && item.status === "pending" && !item.passport_file_path) {
    alertHtml = `<div class="warning-msg">🛂 Passport not yet uploaded. Sakani cannot submit.</div>`;
  }

  const countdownClass = item.status === "sent" || item.status === "submitted" ? "completed" :
    (getCountdownText(item.checkin_date).includes("Overdue") ? "overdue" : "");

  return `
    <div class="card${isTomorrow ? " tomorrow-card" : ""}" data-id="${item.id}" data-type="${item._type}">
      <div class="card-header">
        <div class="card-title">
          <div class="guest-name">${escHtml(guestName)}</div>
          <div class="res-id">${typeLabel} · #${escHtml(item.reservation_id || "-")}</div>
        </div>
        <div class="card-header-right">
          <div class="card-countdown${countdownClass ? " " + countdownClass : ""}">${countdown}</div>
          <div class="status-badge ${statusClass(item.status)}">${icon} ${label}</div>
        </div>
      </div>
      <div class="card-actions">
        ${!isEmail ? `<button class="card-action-btn portal-btn" title="Open portal" onclick="openPortalHelper('${item.reservation_id}','${item.apartment_no}','${item.id}')">🏛️ Portal</button>` : ""}
        <button class="card-action-btn" title="Mark done" onclick="cardActionDone('${item.id}','${item._type}')">✓</button>
        <button class="card-action-btn" title="Retry" onclick="cardActionRetry('${item.id}','${item._type}')">↻</button>
      </div>
      <div class="card-details">
        <div class="detail"><span class="icon">🏢</span><span class="val">${escHtml(item.building || "-")}</span></div>
        <div class="detail"><span class="icon">🚪</span><span class="val">Apt ${escHtml(item.apartment_no || "-")}</span></div>
        <div class="detail"><span class="icon">📅</span><span class="val">${formatDateShort(item.checkin_date)} → ${formatDateShort(item.checkout_date)}</span></div>
        ${!isEmail ? `<div class="detail"><span class="icon">🌍</span><span class="val">${escHtml(item.nationality || "-")}</span></div>` :
          `<div class="detail"><span class="icon">📨</span><span class="val">${escHtml((item.building_email || "-").split("@")[0])}</span></div>`}
      </div>
      ${alertHtml}
    </div>`;
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function attachCardActions() {
  // Actions are inline in HTML via onclick
}

async function cardActionDone(id, type) {
  try {
    const table = type === "email" ? "email_log" : "sakani_queue";
    const newStatus = type === "email" ? "sent" : "submitted";
    const { error } = await sb.from(table).update({ status: newStatus }).eq("id", id);
    if (error) throw error;
    showToast(`✅ Marked as ${newStatus}`);
    await loadAll();
  } catch (e) {
    showToast("❌ Error: " + e.message);
  }
}

async function cardActionRetry(id, type) {
  try {
    const table = type === "email" ? "email_log" : "sakani_queue";
    const { error } = await sb.from(table).update({ status: "pending" }).eq("id", id);
    if (error) throw error;
    showToast("↻ Retrying...");
    await loadAll();
  } catch (e) {
    showToast("❌ Error: " + e.message);
  }
}

// --- PORTAL HELPER ---
const PORTAL_URL = SUPABASE_URL + "/functions/v1/portal-helper";
let currentPortalData = null;

async function openPortalHelper(resId, aptNo, itemId) {
  const overlay = document.getElementById("portalOverlay");
  const popup = document.getElementById("portalPopup");
  popup.innerHTML = '<div style="text-align:center;padding:30px"><div class="spinner"></div><div style="margin-top:12px;color:var(--text-dim)">Loading portal data...</div></div>';
  overlay.style.display = "flex";

  try {
    const res = await fetch(PORTAL_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON },
      body: JSON.stringify({ reservation_id: resId, apartment_no: aptNo }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    currentPortalData = data;

    const portalColors = { sakani: "var(--green)", bunat: "var(--orange)", iskaan: "var(--blue)", nshama: "var(--purple)", kaizen: "var(--accent)", syoam: "var(--red)" };
    const color = portalColors[data.portalType] || "var(--gray)";

    popup.innerHTML = `
      <h3>🏛️ Portal Registration</h3>
      <div class="portal-type-badge" style="background:${color}22;color:${color};border:1px solid ${color}">${escHtml(data.portalType.toUpperCase())}</div>
      ${data.portalLogin ? `<div class="field-group"><div class="field-label">Login</div><div class="field-value" onclick="copyField(this)">${escHtml(data.portalLogin)}</div></div>` : ""}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div class="field-group"><div class="field-label">First Name</div><div class="field-value" onclick="copyField(this)">${escHtml(data.guest.firstName)}</div></div>
        <div class="field-group"><div class="field-label">Last Name</div><div class="field-value" onclick="copyField(this)">${escHtml(data.guest.lastName)}</div></div>
      </div>
      <div class="field-group"><div class="field-label">Email</div><div class="field-value" onclick="copyField(this)">${escHtml(data.guest.email || "-")}</div></div>
      <div class="field-group"><div class="field-label">Phone</div><div class="field-value" onclick="copyField(this)">${escHtml(data.guest.phone || "-")}</div></div>
      <div class="field-group"><div class="field-label">Nationality</div><div class="field-value" onclick="copyField(this)">${escHtml(data.guest.nationality || "-")}</div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div class="field-group"><div class="field-label">Check-in</div><div class="field-value" onclick="copyField(this)">${escHtml(data.stay.checkin)}</div></div>
        <div class="field-group"><div class="field-label">Check-out</div><div class="field-value" onclick="copyField(this)">${escHtml(data.stay.checkout)}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
        <div class="field-group"><div class="field-label">Adults</div><div class="field-value" onclick="copyField(this)">${data.guest.adults}</div></div>
        <div class="field-group"><div class="field-label">Children</div><div class="field-value" onclick="copyField(this)">${data.guest.children}</div></div>
        <div class="field-group"><div class="field-label">Total</div><div class="field-value" onclick="copyField(this)">${data.guest.totalGuests}</div></div>
      </div>
      <div class="field-group"><div class="field-label">Apartment</div><div class="field-value" onclick="copyField(this)">${escHtml(data.apartment.number)} - ${escHtml(data.apartment.building)}</div></div>
      ${data.passportAvailable ? '<div style="color:var(--green);font-size:12px;margin-top:8px">✅ Passport available</div>' : '<div style="color:var(--orange);font-size:12px;margin-top:8px">⚠️ Passport not uploaded yet</div>'}
      <div class="action-row">
        ${data.portalUrl && data.portalUrl.startsWith("http") ? `<button class="popup-btn btn-open" onclick="window.open('${escHtml(data.portalUrl)}','_blank')">🔗 Open Portal</button>` : ""}
        <button class="popup-btn btn-copy" onclick="copyAllFields()">📋 Copy All</button>
      </div>

        <button class="popup-btn btn-done" onclick="markPortalDone('${itemId}')">✅ Mark Submitted</button>

function copyField(el) {
  navigator.clipboard.writeText(el.textContent.trim());
  el.style.borderColor = "var(--green)";
  setTimeout(() => { el.style.borderColor = ""; }, 800);
  showToast("📋 Copied: " + el.textContent.trim().substring(0, 40));
}

function copyAllFields() {
  if (currentPortalData) {
    navigator.clipboard.writeText(currentPortalData.clipboardText);
    showToast("📋 All data copied to clipboard");
  }
}

async function markPortalDone(itemId) {
  try {
    const { error } = await sb.from("sakani_queue").update({ status: "submitted" }).eq("id", itemId);
    if (error) throw error;
    showToast("✅ Marked as submitted");
    closePortalPopup();
    await loadAll();
  } catch (e) {
    showToast("❌ Error: " + e.message);
  }
}

function closePortalPopup(e) {
  if (e && e.target !== document.getElementById("portalOverlay")) return;
  document.getElementById("portalOverlay").style.display = "none";
  currentPortalData = null;
}

// --- TRIGGER VIA EDGE FUNCTION ---
const TRIGGER_URL = SUPABASE_URL + "/functions/v1/trigger-process";

async function triggerEmails() {
  const btn = document.getElementById("btnEmails");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-small"></span> En cours...';
  try {
    const res = await fetch(TRIGGER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON },
      body: JSON.stringify({ action: "emails" }),
    });
    const result = await res.json();
    if (result.status === "error") throw new Error(result.message);
    const count = result.emails?.count || 0;
    showToast(`✅ ${count} email(s) relancé(s) + WhatsApp envoyé`);
    await loadAll();
  } catch (e) {
    showToast("❌ Erreur: " + e.message);
  }
  btn.disabled = false;
  btn.innerHTML = "📧 Relancer Emails";
}

async function triggerSakani() {
  const btn = document.getElementById("btnSakani");
  btn.disabled = true;
